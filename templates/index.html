<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RegMachine Web 注册码生成器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="hero-panel">
            <div>
                <p class="eyebrow">RegMachine Web</p>
                <h1>注册码生成器</h1>
            </div>
        </header>

        <div class="alert alert-danger d-none" id="errorBox"></div>
        <div class="alert alert-success d-none" id="successBox"></div>

        <main class="main-grid">
            <section class="panel form-panel">
                <div class="panel-header">
                    <h2>注册码信息</h2>
                    <span class="badge text-bg-light">DES</span>
                </div>
                <div class="panel-body">
                    <label class="form-label label-with-tip" for="sn">
                            <span>注册码</span>
                            <span class="field-tip" tabindex="0" aria-label="注册码说明">
                                <span class="field-tip-dot" aria-hidden="true"></span>
                                <span class="field-tip-content" role="tooltip">
                                    对应旧版 sn 输入框。填写后点击「生成注册码」，使用 DES 算法和密钥生成激活码。
                                </span>
                            </span>
                        </label>
                        <textarea id="sn" class="form-control" rows="3" placeholder="请输入注册码">{{ default_sn }}</textarea>

                        <label class="form-label label-with-tip mt-3" for="keySelect">
                            <span>密钥</span>
                            <span class="field-tip" tabindex="0" aria-label="密钥说明">
                                <span class="field-tip-dot" aria-hidden="true"></span>
                                <span class="field-tip-content" role="tooltip">
                                    DES 加密使用的 8 字节密钥。默认项为内置密钥；也可选择历史记录或输入自定义密钥，自定义密钥会在生成成功后保存到本地。
                                </span>
                            </span>
                        </label>
                        <div class="key-field" data-builtin-key="{{ default_key }}">
                            <select id="keySelect" class="form-select form-control"></select>
                            <input
                                id="keyCustom"
                                class="form-control mt-2 d-none"
                                maxlength="8"
                                autocomplete="off"
                                placeholder="请输入 8 字节自定义密钥"
                            >
                        </div>

                        <button id="generateRegisterButton" class="btn btn-accent btn-lg w-100 mt-4">生成注册码</button>
                </div>
            </section>

            <section class="panel result-panel">
                <div class="panel-header">
                    <h2>生成结果</h2>
                    <button id="clearButton" class="btn btn-outline-light btn-sm">清空结果</button>
                </div>
                <div class="result-grid">
                    <article class="result-card">
                        <div>
                            <span>激活码</span>
                            <button class="copy-btn" data-copy-target="registerCode">复制</button>
                        </div>
                        <pre id="registerCode">等待生成</pre>
                    </article>
                    <article class="result-card note-card">
                        <span>兼容说明</span>
                        <p id="compatibilityNote">对注册码输入执行 DES/XDES 加密，密钥默认使用内置密钥。</p>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
